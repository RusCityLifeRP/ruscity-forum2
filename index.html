<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RusCity Life RP — Форум</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Шапка сайта -->
    <header class="forum-header">
        <div class="header-logo" onclick="showScreen('screen-forum')">
            <span class="logo-main">RusCity</span> <span class="logo-sub">Life RP</span>
        </div>
        
        <nav class="header-nav">
            <button onclick="showScreen('screen-forum')" class="nav-btn-modern">🏠 Главная</button>
            <button id="btn-profile-edit" class="nav-btn-modern hidden" onclick="showScreen('screen-profile')">⚙️ Настройки</button>
            <button id="btn-admin-panel" class="nav-btn-modern btn-admin-accent hidden" onclick="openAdminPanel()">👑 Админ-панель</button>
        </nav>

        <div class="auth-zone">
            <div id="auth-buttons">
                <button onclick="showScreen('screen-login')" class="btn-primary">Войти</button>
            </div>
            <div id="user-menu" class="user-profile-menu hidden" onclick="showScreen('screen-profile')">
                <img id="header-avatar" src="" alt="Аватар" class="profile-avatar-mini">
                <span id="header-username" class="profile-username-text">Загрузка...</span>
                <button onclick="logout(); event.stopPropagation();" class="btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <!-- Основной контейнер -->
    <main class="forum-container">
        
        <!-- ЭКРАН 1: Список серверов -->
        <div id="screen-forum" class="screen">
            <h2 class="page-title">Игровые серверы RusCity Life RP</h2>
            <div id="servers-list" class="sections-list"></div>
        </div>

        <!-- ЭКРАН 2: Категории сервера -->
        <div id="screen-categories" class="screen hidden">
            <button class="btn-secondary" onclick="showScreen('screen-forum')" style="margin-bottom: 20px;">← К списку серверов</button>
            <h2 id="current-server-title" class="page-title">🏰 Москва</h2>
            <div id="categories-list" class="sections-list"></div>
        </div>

        <!-- ЭКРАН 3: Список организаций/фракций -->
        <div id="screen-factions" class="screen hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn-secondary" id="btn-back-to-categories">← Назад</button>
                <button id="btn-show-create-faction" class="btn-primary hidden" onclick="toggleFactionForm()">+ Создать организацию</button>
            </div>

            <h2 id="current-category-title" class="page-title">🏢 Государственные организации</h2>

            <!-- Форма создания новой организации для Руководства -->
            <div id="create-faction-form" class="form-group hidden" style="background: #232936; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,75,75,0.2);">
                <h3>Создание новой фракции / подраздела</h3>
                <input type="text" id="new-faction-name" placeholder="Например: Прокуратура или ГИБДД">
                <button class="btn-primary" onclick="createNewFaction()">Добавить организацию</button>
            </div>

            <div id="factions-list" class="sections-list"></div>
        </div>

        <!-- ЭКРАН 4: Темы внутри выбранной организации -->
        <div id="screen-topics" class="screen hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn-secondary" id="btn-back-to-factions">← Назад к фракциям</button>
                <button id="btn-show-create-topic" class="btn-primary hidden" onclick="toggleTopicForm()">+ Создать тему</button>
            </div>

            <h2 id="current-faction-title" class="page-title">📌 Название фракции</h2>

            <!-- Форма создания темы внутри фракции -->
            <div id="create-topic-form" class="form-group hidden" style="background: #232936; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,75,75,0.2);">
                <h3>Создание новой темы в этой организации</h3>
                <input type="text" id="new-topic-name" placeholder="Например: Заявления на Старший Состав">
                <button class="btn-primary" onclick="createNewTopic()">Опубликовать тему</button>
            </div>

            <div id="topics-list" class="sections-list"></div>
        </div>

        <!-- Авторизация -->
        <div id="screen-login" class="screen hidden auth-card">
            <h2>Вход на форум</h2>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Электронная почта">
                <input type="password" id="login-password" placeholder="Пароль">
                <button class="btn-primary" onclick="loginUser()">Войти</button>
            </div>
        </div>

        <!-- Редактор профиля -->
        <div id="screen-profile" class="screen hidden profile-editor-card">
            <div class="profile-preview-banner" id="profile-banner-preview">
                <div class="profile-preview-avatar-container">
                    <img id="profile-avatar-preview" src="https://purple-hub.ru/styles/aurora/xenforo/avatars/avatar_m.png" alt="Превью аватара">
                </div>
            </div>
            <h2 style="margin-top: 50px; text-align: center;">Настройки профиля</h2>
            <div class="form-group">
                <label class="input-label">Ваш никнейм на форуме</label>
                <input type="text" id="edit-username" placeholder="Введите новый ник">
                <div class="upload-grid">
                    <div>
                        <label class="input-label">Фото профиля</label>
                        <button class="btn-upload-custom" onclick="document.getElementById('file-avatar').click()">📁 Выбрать аватар</button>
                        <input type="file" id="file-avatar" accept="image/*" class="hidden" onchange="previewImage(this, 'profile-avatar-preview')">
                    </div>
                    <div>
                        <label class="input-label">Обложка (Баннер)</label>
                        <button class="btn-upload-custom" onclick="document.getElementById('file-banner').click()">🖼️ Выбрать баннер</button>
                        <input type="file" id="file-banner" accept="image/*" class="hidden" onchange="previewImage(this, 'profile-banner-preview', true)">
                    </div>
                </div>
                <div class="profile-editor-actions">
                    <button class="btn-primary btn-save" onclick="saveProfileChanges()">💾 Сохранить изменения</button>
                    <button class="btn-secondary" onclick="showScreen('screen-forum')">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Админка -->
        <div id="screen-admin" class="screen hidden">
            <h2>Управление пользователями (Выдача ролей)</h2>
            <div id="admin-users-list" class="admin-list-container"></div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
