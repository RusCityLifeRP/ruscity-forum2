<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RusCity Life RP — Форум</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header class="forum-header">
        <div class="header-logo" onclick="showScreen('screen-forum')">
            <span class="logo-main">RusCity</span> <span class="logo-sub">Life RP</span>
        </div>
        
        <nav class="header-nav">
            <button onclick="showScreen('screen-forum')" class="nav-link">Главная</button>
            <button id="btn-admin-panel" class="nav-link hidden" onclick="openAdminPanel()">Админ-панель</button>
        </nav>

        <div class="auth-zone">
            <div id="auth-buttons">
                <button onclick="showScreen('screen-login')" class="btn-primary">Войти</button>
            </div>
            <div id="user-menu" class="user-profile-menu hidden">
                <img id="header-avatar" src="" alt="Аватар" class="profile-avatar-mini">
                <span id="header-username" class="profile-username-text">Загрузка...</span>
                <button onclick="logout()" class="btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <main class="forum-container">
        
        <div id="screen-forum" class="screen animate-fade">
            <h2 class="page-title">Игровые серверы RusCity Life RP</h2>
            <div id="servers-list" class="sections-list"></div>
        </div>

        <div id="screen-login" class="screen hidden auth-card animate-fade">
            <h2>Вход на форум</h2>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Электронная почта">
                <input type="password" id="login-password" placeholder="Пароль">
                <button class="btn-primary" onclick="loginUser()">Войти</button>
            </div>
        </div>

        <div id="screen-admin" class="screen hidden animate-fade">
            <h2>Управление пользователями (Выдача ролей)</h2>
            <div id="admin-users-list" class="admin-list-container">
                </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
